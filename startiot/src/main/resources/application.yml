spring:
  application:
    name: startiot

  datasource:
    url: jdbc:postgresql://localhost:5432/startiot
    username: ${DB_USER:startiot}
    password: ${DB_PASS:startiot}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.orm.jdbc.bind: TRACE
